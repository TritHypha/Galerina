# Galerina Diagnostic Schema — Master Index
# Machine-readable registry for all SPORE-* diagnostic codes
# Load this file to resolve any diagnostic code without parsing prose.
#
# Diagnostic interface (all families):
#   code:             string   — e.g. "SPORE-TYPE-001"
#   name:             string   — e.g. "UnknownType"
#   severity:         error | warning | info
#   message:          string   — what went wrong
#   location?:        SourceLocation — where in source
#   suggestedFix?:    string   — human-readable fix (Elm-style)
#   suggestedCode?:   string   — exact snippet to insert/replace (machine-applicable)
#   relatedLocations?: [{message, location}] — Rust-style secondary locations
#   why?:             string   — why this is a problem (Elm-style)
#   risk?:            string   — what goes wrong if ignored (Elm-style)
#
# See: docs/Knowledge-Bases/galerina-language-lessons.md
schemaVersion: "1.0"
families:
  - id: SPORE-TYPE
    file: type.schema.yaml
    description: "Type checker diagnostics"
  - id: SPORE-NAME
    file: name.schema.yaml
    description: "Symbol resolution diagnostics"
  - id: SPORE-MATCH
    file: match.schema.yaml
    description: "Match exhaustiveness diagnostics"
  - id: SPORE-VALUESTATE
    file: valuestate.schema.yaml
    description: "Value-state checker diagnostics"
  - id: SPORE-SECRET
    file: secret.schema.yaml
    description: "Secret / SecureString diagnostics"
  - id: SPORE-EFFECT
    file: effect.schema.yaml
    description: "Effect checker diagnostics"
  - id: SPORE-GOV
    file: governance.schema.yaml
    description: "Governance verifier diagnostics"
  - id: SPORE-SYNTAX
    file: syntax.schema.yaml
    description: "Syntax rule violations"
  - id: SPORE-PARSE
    file: parse.schema.yaml
    description: "Parser diagnostics"
