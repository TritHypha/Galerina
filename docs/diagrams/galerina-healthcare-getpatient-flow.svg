<svg width="100%" viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina — a governed healthcare flow (getPatient, a regulated worked example)</title>
<desc>A real PHI use case, end to end. The secure flow requires an actor in the request context, validates the untrusted patient id (untaint), declares database.read / phi.read / audit.write effects, reads the protected record, binds a redacted actor before the audit sink (else FUNGI-VALUESTATE-008), denies protected data to the response body via a privacy clause, and returns a summary carrying no PHI. It is galerina check clean under plain and strict.</desc>
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="34" y="30" font-size="16" font-weight="700" fill="#1c2128">Galerina — a governed healthcare flow (getPatient)</text>
<text x="34" y="49" font-size="11" fill="#5a6470">a regulated PHI use case, proven end-to-end · amber = untrusted · blue = gate · teal = governed · purple = privacy invariant</text>

<!-- contract column (left) -->
<rect x="34" y="66" width="240" height="452" rx="11" fill="#f3eefa" stroke="#7a5bb0" stroke-width="1.7"/>
<text x="154" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#43306b">the contract</text>
<rect x="52" y="104" width="204" height="52" rx="7" fill="#eee7f7" stroke="#7a5bb0" stroke-width="1.1"/>
<text x="154" y="124" text-anchor="middle" font-size="10" font-weight="600" fill="#43306b">request { context {</text>
<text x="154" y="140" text-anchor="middle" font-size="10" font-weight="600" fill="#43306b">require actor } }</text>
<text x="154" y="152" text-anchor="middle" font-size="8.6" fill="#5a4584">who is asking must be named</text>
<rect x="52" y="168" width="204" height="66" rx="7" fill="#eee7f7" stroke="#7a5bb0" stroke-width="1.1"/>
<text x="154" y="188" text-anchor="middle" font-size="10" font-weight="600" fill="#43306b">effects {</text>
<text x="154" y="204" text-anchor="middle" font-size="9.5" fill="#43306b">database.read · phi.read</text>
<text x="154" y="219" text-anchor="middle" font-size="9.5" fill="#43306b">audit.write }</text>
<text x="154" y="230" text-anchor="middle" font-size="8.6" fill="#5a4584">secure tier — phi.read demands it</text>
<rect x="52" y="246" width="204" height="60" rx="7" fill="#eee7f7" stroke="#7a5bb0" stroke-width="1.1"/>
<text x="154" y="266" text-anchor="middle" font-size="9.6" font-weight="600" fill="#43306b">privacy { deny protected</text>
<text x="154" y="281" text-anchor="middle" font-size="9.6" font-weight="600" fill="#43306b">to response.body }</text>
<text x="154" y="297" text-anchor="middle" font-size="8.6" fill="#5a4584">no PHI may leave in the body</text>
<rect x="52" y="318" width="204" height="52" rx="7" fill="#eee7f7" stroke="#7a5bb0" stroke-width="1.1"/>
<text x="154" y="338" text-anchor="middle" font-size="9.6" font-weight="600" fill="#43306b">audit { require runtime report }</text>
<text x="154" y="354" text-anchor="middle" font-size="8.6" fill="#5a4584">evidence is mandatory,</text>
<text x="154" y="365" text-anchor="middle" font-size="8.6" fill="#5a4584">not optional</text>
<text x="154" y="396" text-anchor="middle" font-size="9.3" fill="#5a4584">the contract is the spec —</text>
<text x="154" y="410" text-anchor="middle" font-size="9.3" fill="#5a4584">the body must satisfy it or</text>
<text x="154" y="424" text-anchor="middle" font-size="9.3" fill="#5a4584">the flow does not compile</text>
<rect x="52" y="444" width="204" height="60" rx="7" fill="#eef7f5" stroke="#2b8a7e" stroke-width="1.2"/>
<text x="154" y="466" text-anchor="middle" font-size="10" font-weight="700" fill="#14534b">galerina check</text>
<text x="154" y="484" text-anchor="middle" font-size="9.5" fill="#1f6b60">0 errors · 0 warnings</text>
<text x="154" y="497" text-anchor="middle" font-size="8.8" fill="#1f6b60">plain AND --strict-types</text>

<!-- body column (right) -->
<text x="516" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1c2128">the body</text>
<rect x="300" y="100" width="432" height="42" rx="7" fill="#f8e4bf" stroke="#c08a2e" stroke-width="1.3"/>
<text x="516" y="118" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6b4e15">unsafe let rawId = request.body.patientId</text>
<text x="516" y="133" text-anchor="middle" font-size="8.8" fill="#7d5e1d">tainted boundary input</text>
<path d="M516 142 L516 158" fill="none" stroke="#3b6fd4" stroke-width="2" marker-end="url(#ar)"/>
<rect x="300" y="158" width="432" height="42" rx="7" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.4"/>
<text x="516" y="176" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f3a6b">let patientId: protected PatientId = validate.patientId(rawId)?</text>
<text x="516" y="191" text-anchor="middle" font-size="8.8" fill="#3a5285">untaint — prove or Err</text>
<path d="M516 200 L516 216" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#ar)"/>
<rect x="300" y="216" width="432" height="42" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.4"/>
<text x="516" y="234" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14534b">let record = PatientsDB.get(patientId)?</text>
<text x="516" y="249" text-anchor="middle" font-size="8.8" fill="#1f6b60">phi.read · protected record</text>
<path d="M516 258 L516 274" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#ar)"/>
<rect x="300" y="274" width="432" height="42" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.4"/>
<text x="516" y="292" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14534b">let actorRef: redacted = redact(request.context.actor)</text>
<text x="516" y="307" text-anchor="middle" font-size="8.8" fill="#1f6b60">bind BEFORE the audit sink — else FUNGI-VALUESTATE-008</text>
<path d="M516 316 L516 332" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#ar)"/>
<rect x="300" y="332" width="432" height="42" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.4"/>
<text x="516" y="350" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14534b">AuditLog.write({ actor: actorRef, patientId: record.id })</text>
<text x="516" y="365" text-anchor="middle" font-size="8.8" fill="#1f6b60">redacted / id-only evidence</text>
<path d="M516 374 L516 390" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#ar)"/>
<rect x="300" y="390" width="432" height="46" rx="7" fill="#eef7f5" stroke="#2b8a7e" stroke-width="1.5"/>
<text x="516" y="410" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14534b">return Ok(PatientSummary { ... })</text>
<text x="516" y="426" text-anchor="middle" font-size="8.8" fill="#1f6b60">a summary — the privacy clause kept the PHI out of the body</text>

<!-- invariant -->
<rect x="300" y="450" width="432" height="54" rx="9" fill="#f3eefa" stroke="#7a5bb0" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="516" y="472" text-anchor="middle" font-size="10.5" font-weight="700" fill="#43306b">the regulated invariant — PHI is proven, minimised, audited, and never egressed raw</text>
<text x="516" y="490" text-anchor="middle" font-size="9.3" fill="#5a4584">maps examples/healthcare/getPatient.fungi · the same shape as 178-governed-data-query and the breach diagram</text>
</svg>
