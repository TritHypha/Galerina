<svg width="100%" viewBox="0 0 780 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina — Govern-Don't-Absorb (convert decisions, not compute)</title>
<desc>Galerina converts the GOVERNED DECISION SURFACE — verdicts, gates, policy/K3, privacy cuts, effect and taint checks — into checker-verified .fungi twins. It does NOT convert pure compute (math, graph algorithms), cryptography, the WASM toolchain, or host I/O: those are the declared minimal host floor, vetted and pinned, correctly .ts/native. The host is a dumb byte-mover; a governed decision compiles to a verdict the floor cannot override. This is why substrate-math, graph-algorithms and core-security are NOT .fungi-twin candidates — they are compute/crypto, not decisions.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="34" y="30" font-size="16" font-weight="700" fill="#1c2128">Galerina — Govern-Don't-Absorb</text>
<text x="34" y="49" font-size="11" fill="#5a6470">Convert the decision surface to .fungi · leave compute + crypto as the declared floor · teal = governed (convert) · gray = host floor (stays native) · purple = invariant</text>

<!-- TOP: governed decision surface (convert) -->
<rect x="34" y="66" width="712" height="140" rx="11" fill="#e3f5f2" stroke="#2b8a7e" stroke-width="1.9"/>
<text x="390" y="90" text-anchor="middle" font-size="13.5" font-weight="700" fill="#14534b">GOVERNED DECISION SURFACE — convert to checker-verified .fungi twins</text>
<rect x="52" y="104" width="164" height="86" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.1"/>
