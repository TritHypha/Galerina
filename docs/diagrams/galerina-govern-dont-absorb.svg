<text x="134" y="398" text-anchor="middle" font-size="9" fill="#5f5e5a">frozen TCB · #149 per-pkg</text>
<rect x="228" y="324" width="164" height="96" rx="7" fill="#e6e4db" stroke="#888780" stroke-width="1.1"/>
<text x="310" y="346" text-anchor="middle" font-size="11" font-weight="600" fill="#2c2c2a">Pure compute</text>
<text x="310" y="364" text-anchor="middle" font-size="9.3" fill="#5f5e5a">substrate-math</text>
<text x="310" y="378" text-anchor="middle" font-size="9.3" fill="#5f5e5a">graph-algorithms</text>
<text x="310" y="398" text-anchor="middle" font-size="9" fill="#5f5e5a">no ASCII math — it's a value, not a verdict</text>
<rect x="404" y="324" width="164" height="96" rx="7" fill="#e6e4db" stroke="#888780" stroke-width="1.1"/>
<text x="486" y="346" text-anchor="middle" font-size="11" font-weight="600" fill="#2c2c2a">WASM toolchain</text>
<text x="486" y="364" text-anchor="middle" font-size="9.3" fill="#5f5e5a">wabt · wat-wasm</text>
<text x="486" y="378" text-anchor="middle" font-size="9.3" fill="#5f5e5a">.fungi → .wasm assembler</text>
<text x="486" y="398" text-anchor="middle" font-size="9" fill="#5f5e5a">the build floor (retires w/ .ts)</text>
<rect x="580" y="324" width="150" height="96" rx="7" fill="#e6e4db" stroke="#888780" stroke-width="1.1"/>
<text x="655" y="346" text-anchor="middle" font-size="11" font-weight="600" fill="#2c2c2a">Host I/O seam</text>
<text x="655" y="364" text-anchor="middle" font-size="9.3" fill="#5f5e5a">fuse-loader · fs · FFI</text>
<text x="655" y="378" text-anchor="middle" font-size="9.3" fill="#5f5e5a">WebAssembly.instantiate</text>
<text x="655" y="398" text-anchor="middle" font-size="9" fill="#5f5e5a">9-primitive typed seam</text>

<!-- invariant -->
<rect x="34" y="452" width="712" height="72" rx="9" fill="#f3eefa" stroke="#7a5bb0" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="390" y="474" text-anchor="middle" font-size="11.5" font-weight="700" fill="#43306b">The invariant — "100% .fungi" means 100% of the GOVERNED SURFACE in checker-verified twins, over a bounded, shrinking floor N</text>
<text x="390" y="493" text-anchor="middle" font-size="10" fill="#5a4584">substrate-math · graph-algorithms · core-security are NOT twin candidates — they are compute/crypto, not decisions (the audit enforces the split)</text>
<text x="390" y="510" text-anchor="middle" font-size="9.5" fill="#5a4584">gated by scripts/audit-kernel-fungi-twins.mjs + audit-kernel-floor.mjs · deleting the .ts stays execution-switch-gated (#143 WASM byte-parity)</text>
</svg>
