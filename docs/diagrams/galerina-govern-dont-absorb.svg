<text x="134" y="144" text-anchor="middle" font-size="9.3" fill="#1f6b60">K3 vAnd · admission</text>
<text x="134" y="158" text-anchor="middle" font-size="9.3" fill="#1f6b60">deny-by-default</text>
<text x="134" y="176" text-anchor="middle" font-size="9.3" fill="#1f6b60">secret-gate · route-defaults</text>
<rect x="228" y="104" width="164" height="86" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.1"/>
<text x="310" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#14534b">Policy &amp; privacy</text>
<text x="310" y="144" text-anchor="middle" font-size="9.3" fill="#1f6b60">privacy cut(&lt;field&gt;)</text>
<text x="310" y="158" text-anchor="middle" font-size="9.3" fill="#1f6b60">authority · purpose</text>
<text x="310" y="176" text-anchor="middle" font-size="9.3" fill="#1f6b60">value-state 003/006/008</text>
<rect x="404" y="104" width="164" height="86" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.1"/>
<text x="486" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#14534b">Effect &amp; taint</text>
<text x="486" y="144" text-anchor="middle" font-size="9.3" fill="#1f6b60">CANONICAL_EFFECTS</text>
<text x="486" y="158" text-anchor="middle" font-size="9.3" fill="#1f6b60">tier floor · epistemic trit</text>
<text x="486" y="176" text-anchor="middle" font-size="9.3" fill="#1f6b60">import-plugin grant</text>
<rect x="580" y="104" width="150" height="86" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.1"/>
<text x="655" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#14534b">Type &amp; match</text>
<text x="655" y="144" text-anchor="middle" font-size="9.3" fill="#1f6b60">exhaustiveness</text>
<text x="655" y="158" text-anchor="middle" font-size="9.3" fill="#1f6b60">fail-closed _ =&gt; deny</text>
<text x="655" y="176" text-anchor="middle" font-size="9.3" fill="#1f6b60">governed Result&lt;T,E&gt;</text>

<!-- THE SEAM -->
<rect x="34" y="222" width="712" height="46" rx="9" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.8"/>
<text x="390" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#1f3a6b">THE SEAM — convert DECISIONS, not compute · the host is a dumb byte-mover</text>
<text x="390" y="259" text-anchor="middle" font-size="9.5" fill="#3a5285">decisions cross DOWN to execute; the VERDICT stays governed above — the floor can never override it</text>
<path d="M390 206 L390 220" fill="none" stroke="#3b6fd4" stroke-width="2" marker-end="url(#arr)"/>
<path d="M390 268 L390 284" fill="none" stroke="#888780" stroke-width="2" marker-end="url(#arr)"/>

<!-- BOTTOM: declared minimal host floor (stays native) -->
<rect x="34" y="286" width="712" height="150" rx="11" fill="#f1efe8" stroke="#888780" stroke-width="1.9"/>
<text x="390" y="310" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2c2c2a">DECLARED MINIMAL HOST FLOOR — vetted + pinned · stays .ts / native (NOT a decision)</text>
<rect x="52" y="324" width="164" height="96" rx="7" fill="#e6e4db" stroke="#888780" stroke-width="1.1"/>
<text x="134" y="346" text-anchor="middle" font-size="11" font-weight="600" fill="#2c2c2a">Cryptography</text>
<text x="134" y="364" text-anchor="middle" font-size="9.3" fill="#5f5e5a">@noble/* · argon2</text>
