<svg width="100%" viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina — Ungoverned vs Governed (the breach that can't compile)</title>
<desc>Left: a typical language runs a PII flow with no gate — the raw email is logged, sent over the network, and stored at rest; it compiles and runs, and the breach is silent. Right: the same flow in Galerina refuses to compile — the untrusted boundary must be validated (FUNGI-VALUESTATE-003), a protected value must be redacted before egress (FUNGI-VALUESTATE-006), an un-gated boundary-to-sink is FUNGI-VALUESTATE-008, and protected data is denied to the response body. Same intent; Galerina makes the leak a compile error, not a runtime incident.</desc>
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="34" y="30" font-size="16" font-weight="700" fill="#1c2128">Galerina — the breach that can't compile</text>
<text x="34" y="49" font-size="11" fill="#5a6470">The same PII flow, two languages · left = it ships and leaks · right = the governed compile refuses it · red = leak · teal = governed · blue = gate</text>

<!-- LEFT: ungoverned -->
<rect x="24" y="64" width="376" height="430" rx="12" fill="#fdf4f2" stroke="#c0392b" stroke-width="1.8"/>
<text x="212" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#8f2519">Ungoverned — a typical language</text>
<text x="212" y="105" text-anchor="middle" font-size="9.5" fill="#a5382b">no boundary is proven; PII flows wherever the code sends it</text>

<rect x="52" y="120" width="320" height="40" rx="7" fill="#f8e4bf" stroke="#c08a2e" stroke-width="1.2"/>
<text x="212" y="136" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6b4e15">let email = request.body.email</text>
<text x="212" y="151" text-anchor="middle" font-size="9" fill="#7d5e1d">raw, untrusted — but treated as a plain string</text>

<path d="M212 160 L212 178" fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#ar)"/>
<rect x="52" y="178" width="320" height="38" rx="7" fill="#fbe6e2" stroke="#c0392b" stroke-width="1.3"/>
<text x="150" y="200" text-anchor="middle" font-size="10.5" fill="#8f2519">console.log(email)</text>
<text x="315" y="200" text-anchor="middle" font-size="9.5" font-weight="700" fill="#8f2519">LEAK → logs</text>

<path d="M212 216 L212 232" fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#ar)"/>
<rect x="52" y="232" width="320" height="38" rx="7" fill="#fbe6e2" stroke="#c0392b" stroke-width="1.3"/>
<text x="150" y="254" text-anchor="middle" font-size="10.5" fill="#8f2519">http.post(url, { email })</text>
<text x="312" y="254" text-anchor="middle" font-size="9.5" font-weight="700" fill="#8f2519">LEAK → wire</text>

<path d="M212 270 L212 286" fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#ar)"/>
<rect x="52" y="286" width="320" height="38" rx="7" fill="#fbe6e2" stroke="#c0392b" stroke-width="1.3"/>
<text x="150" y="308" text-anchor="middle" font-size="10.5" fill="#8f2519">db.insert({ email })</text>
<text x="312" y="308" text-anchor="middle" font-size="9.5" font-weight="700" fill="#8f2519">raw at rest</text>

<path d="M212 324 L212 340" fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#ar)"/>
<rect x="52" y="340" width="320" height="38" rx="7" fill="#fbe6e2" stroke="#c0392b" stroke-width="1.3"/>
<text x="150" y="362" text-anchor="middle" font-size="10.5" fill="#8f2519">return { user: email }</text>
<text x="316" y="362" text-anchor="middle" font-size="9.5" font-weight="700" fill="#8f2519">LEAK → body</text>

<rect x="52" y="404" width="320" height="72" rx="8" fill="#fbe6e2" stroke="#c0392b" stroke-width="1.5"/>
<text x="212" y="428" text-anchor="middle" font-size="12" font-weight="700" fill="#8f2519">✓ compiles · ✓ runs · ✗ four silent leaks</text>
<text x="212" y="448" text-anchor="middle" font-size="9.5" fill="#a5382b">the breach is discovered in an incident review,</text>
<text x="212" y="463" text-anchor="middle" font-size="9.5" fill="#a5382b">a log scrape, or a regulator's letter — months later</text>

<!-- RIGHT: governed -->
<rect x="420" y="64" width="376" height="430" rx="12" fill="#eef7f5" stroke="#2b8a7e" stroke-width="1.8"/>
<text x="608" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#14534b">Galerina — the same flow, governed</text>
<text x="608" y="105" text-anchor="middle" font-size="9.5" fill="#1f6b60">every boundary is proven at compile time — the leak never links</text>

<rect x="448" y="120" width="320" height="40" rx="7" fill="#f8e4bf" stroke="#c08a2e" stroke-width="1.2"/>
<text x="608" y="136" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6b4e15">unsafe let raw = request.body.email</text>
<text x="608" y="151" text-anchor="middle" font-size="9" fill="#7d5e1d">tainted — cannot reach a sink as-is (else -003 REJECT)</text>

<path d="M608 160 L608 178" fill="none" stroke="#3b6fd4" stroke-width="2" marker-end="url(#ar)"/>
<rect x="448" y="178" width="320" height="46" rx="7" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.4"/>
<text x="608" y="198" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f3a6b">let email: protected Email = validate.email(raw)?</text>
<text x="608" y="214" text-anchor="middle" font-size="9" fill="#3a5285">prove it (ACCEPT) or return Err — untaints the boundary</text>

<path d="M608 224 L608 240" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#ar)"/>
<rect x="448" y="240" width="320" height="46" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.4"/>
<text x="608" y="260" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14534b">let safe: redacted Email = redact(email)</text>
<text x="608" y="276" text-anchor="middle" font-size="9" fill="#1f6b60">bound to a let BEFORE egress (else -006 / -008)</text>

<path d="M608 286 L608 302" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#ar)"/>
<rect x="448" y="302" width="320" height="46" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.4"/>
<text x="608" y="322" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14534b">http.post(url, safe) · AuditLog.write(safe)</text>
<text x="608" y="338" text-anchor="middle" font-size="9" fill="#1f6b60">only redacted / validated values leave</text>

<path d="M608 348 L608 364" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#ar)"/>
<rect x="448" y="364" width="320" height="34" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.4"/>
<text x="608" y="385" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14534b">privacy { deny protected Email to response.body }</text>

<rect x="448" y="410" width="320" height="66" rx="8" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.5"/>
<text x="608" y="434" text-anchor="middle" font-size="12" font-weight="700" fill="#14534b">the raw-leak path is a COMPILE ERROR</text>
<text x="608" y="454" text-anchor="middle" font-size="9.5" fill="#1f6b60">FUNGI-VALUESTATE-003 · -006 · -008 fail-closed —</text>
<text x="608" y="469" text-anchor="middle" font-size="9.5" fill="#1f6b60">the breach is caught before it can ship</text>
</svg>
