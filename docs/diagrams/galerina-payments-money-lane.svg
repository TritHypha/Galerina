<svg width="100%" viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina — a governed payment lane (Money&lt;GBP&gt;, currency as a type)</title>
<desc>Money carries its currency in the type. Money&lt;GBP&gt; + Money&lt;GBP&gt; is fine; Money&lt;GBP&gt; + Money&lt;USD&gt; is a compile error (FUNGI-TYPE-004 cross-currency), and Money times Money is a compile error too — you multiply money by a scalar, not by money. The governed charge flow validates the amount into Money&lt;GBP&gt;, validates the merchant id into a protected value, charges via the payment.charge effect, writes a redacted audit record, and denies protected money to the response body. Currency is a type, not a number; protected money never egresses raw.</desc>
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="34" y="30" font-size="16" font-weight="700" fill="#1c2128">Galerina — a governed payment lane (Money&lt;GBP&gt;)</text>
<text x="34" y="49" font-size="11" fill="#5a6470">currency lives in the type · protected money never egresses raw · teal = ACCEPT / governed · red = REJECT · blue = gate · purple = invariant</text>

<!-- LEFT: currency algebra -->
<rect x="24" y="66" width="352" height="238" rx="11" fill="#f3eefa" stroke="#7a5bb0" stroke-width="1.7"/>
<text x="200" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#43306b">currency is a type — the checker does the algebra</text>
<rect x="44" y="104" width="312" height="44" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.4"/>
<text x="112" y="131" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14534b" font-family="ui-monospace, monospace">GBP + GBP</text>
<text x="300" y="131" text-anchor="middle" font-size="10.5" font-weight="700" fill="#14534b">ACCEPT → Money&lt;GBP&gt;</text>
<rect x="44" y="156" width="312" height="44" rx="7" fill="#fbe6e2" stroke="#c0392b" stroke-width="1.4"/>
<text x="112" y="183" text-anchor="middle" font-size="10.5" font-weight="600" fill="#8f2519" font-family="ui-monospace, monospace">GBP + USD</text>
<text x="300" y="178" text-anchor="middle" font-size="10" font-weight="700" fill="#8f2519">REJECT — TYPE-004</text>
<text x="300" y="192" text-anchor="middle" font-size="8.6" fill="#a5382b">cross-currency add</text>
<rect x="44" y="208" width="312" height="44" rx="7" fill="#fbe6e2" stroke="#c0392b" stroke-width="1.4"/>
<text x="112" y="235" text-anchor="middle" font-size="10.5" font-weight="600" fill="#8f2519" font-family="ui-monospace, monospace">GBP × GBP</text>
<text x="300" y="230" text-anchor="middle" font-size="10" font-weight="700" fill="#8f2519">REJECT — TYPE-004</text>
<text x="300" y="244" text-anchor="middle" font-size="8.6" fill="#a5382b">money × money is nonsense</text>
<rect x="44" y="260" width="312" height="34" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.2"/>
<text x="112" y="281" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14534b" font-family="ui-monospace, monospace">GBP × Decimal</text>
<text x="300" y="281" text-anchor="middle" font-size="10" font-weight="700" fill="#14534b">ACCEPT — scale by a scalar</text>

<!-- RIGHT: governed charge flow -->
<rect x="404" y="66" width="352" height="238" rx="11" fill="#eef7f5" stroke="#2b8a7e" stroke-width="1.7"/>
<text x="580" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14534b">the governed charge — secure flow</text>
<rect x="424" y="104" width="312" height="34" rx="7" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.3"/>
<text x="580" y="125" text-anchor="middle" font-size="9.8" font-weight="600" fill="#1f3a6b">let amount: Money&lt;GBP&gt; = validate.money(req.amount)?</text>
<path d="M580 138 L580 150" fill="none" stroke="#2b8a7e" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="424" y="150" width="312" height="34" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.3"/>
<text x="580" y="171" text-anchor="middle" font-size="9.8" font-weight="600" fill="#14534b">let mId: protected MerchantId = validate.merchantId(...)?</text>
<path d="M580 184 L580 196" fill="none" stroke="#2b8a7e" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="424" y="196" width="312" height="34" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.3"/>
<text x="580" y="217" text-anchor="middle" font-size="9.8" font-weight="600" fill="#14534b">PaymentGateway.charge({ amount, mId })?</text>
<path d="M580 230 L580 242" fill="none" stroke="#2b8a7e" stroke-width="1.8" marker-end="url(#ar)"/>
<rect x="424" y="242" width="312" height="34" rx="7" fill="#d3ede8" stroke="#2b8a7e" stroke-width="1.3"/>
<text x="580" y="263" text-anchor="middle" font-size="9.6" font-weight="600" fill="#14534b">let mRef = redact(mId) → AuditLog.write({ mRef, amount })</text>
<rect x="424" y="282" width="312" height="14" rx="4" fill="#eef7f5"/>
<text x="580" y="293" text-anchor="middle" font-size="8.8" fill="#1f6b60">effects { payment.charge · audit.write } · secure tier</text>

<!-- egress bar -->
<path d="M580 304 L580 320" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#ar)"/>
<rect x="24" y="320" width="732" height="52" rx="10" fill="#e3f5f2" stroke="#2b8a7e" stroke-width="1.6"/>
<text x="390" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#14534b">EGRESS — privacy { deny protected Money to response.body } · return Ok(Receipt { id })</text>
<text x="390" y="361" text-anchor="middle" font-size="9.6" fill="#1f6b60">the receipt id leaves · the amount + merchant stay governed · a raw Money to the body would be denied</text>

<!-- invariant -->
<rect x="24" y="386" width="732" height="118" rx="9" fill="#f3eefa" stroke="#7a5bb0" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="390" y="410" text-anchor="middle" font-size="11.5" font-weight="700" fill="#43306b">the invariant — a whole class of money bugs cannot be written</text>
<text x="390" y="432" text-anchor="middle" font-size="10" fill="#5a4584">the "added two currencies", "multiplied two amounts", "leaked the card holder" bugs are compile errors, not production incidents</text>
<text x="390" y="451" text-anchor="middle" font-size="10" fill="#5a4584">Money&lt;GBP&gt; is a domain-branded type (Brand&lt;Decimal, GBP&gt;) — the currency tag is part of the identity, checked at every operator</text>
<text x="390" y="470" text-anchor="middle" font-size="9.5" fill="#5a4584">maps examples 071-money-gbp · 073-money-cross-currency-invalid · 453-financial-payment-charge — the finance mirror of getPatient</text>
<text x="390" y="488" text-anchor="middle" font-size="9.5" fill="#5a4584">the same governed shape as the healthcare and data-query lanes — one pattern, every regulated domain</text>
</svg>
