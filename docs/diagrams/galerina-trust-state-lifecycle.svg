<svg width="100%" viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina — the Trust-State Lifecycle (prove or redact before use)</title>
<desc>Every value carries a trust state. Untrusted boundary input is "tainted" (unknown until proven); it becomes Trusted only through an untaint gate — validate.*(...)? proves it (ACCEPT) or returns Err (REJECT), and redact(x) bound to a let strips PII. A raw value reaching a sink is FUNGI-VALUESTATE-003 (REJECT); a protected value egressing un-redacted is FUNGI-VALUESTATE-006 (ERROR); an untrusted boundary reaching a governed sink without a gate is FUNGI-VALUESTATE-008 (a migration warning that ERRORS in production). This is the mental model every value-state lane is an instance of.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="34" y="30" font-size="16" font-weight="700" fill="#1c2128">Galerina — the Trust-State Lifecycle</text>
<text x="34" y="49" font-size="11" fill="#5a6470">Untrusted → (prove | redact) → Trusted → sink · the value-state a checker tracks on every binding · amber = untrusted · blue = untaint gate · teal = trusted · red = REJECT · purple = invariant</text>

<!-- HAPPY PATH pipeline -->
<!-- 1. tainted boundary -->
<rect x="34" y="86" width="196" height="72" rx="9" fill="#fcf0d9" stroke="#c08a2e" stroke-width="1.8"/>
<text x="132" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#6b4e15">TAINTED — boundary input</text>
<text x="132" y="128" text-anchor="middle" font-size="10.5" fill="#7d5e1d">unsafe let raw = request.x</text>
<text x="132" y="144" text-anchor="middle" font-size="9.5" fill="#7d5e1d">unknown until proven · cannot reach a sink</text>

<path d="M230 122 L286 122" fill="none" stroke="#3b6fd4" stroke-width="2" marker-end="url(#arr)"/>

<!-- 2. untaint gate -->
<rect x="286" y="80" width="230" height="84" rx="9" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.8"/>
<text x="401" y="102" text-anchor="middle" font-size="12" font-weight="700" fill="#1f3a6b">UNTAINT GATE</text>
<text x="401" y="120" text-anchor="middle" font-size="10.5" fill="#3a5285">validate.*(raw)?  — prove or Err</text>
<text x="401" y="136" text-anchor="middle" font-size="10.5" fill="#3a5285">redact(x) → bound to a let  — strip PII</text>
<text x="401" y="153" text-anchor="middle" font-size="9.3" fill="#3a5285">K3: ACCEPT → trusted+bound · REJECT → Err · never a silent pass</text>

<path d="M516 122 L572 122" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#arr)"/>
<text x="544" y="114" text-anchor="middle" font-size="9.5" font-weight="700" fill="#14534b">ACCEPT</text>

<!-- 3. trusted -->
<rect x="572" y="86" width="214" height="72" rx="9" fill="#e3f5f2" stroke="#2b8a7e" stroke-width="1.8"/>
<text x="679" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#14534b">TRUSTED — validated / redacted</text>
<text x="679" y="128" text-anchor="middle" font-size="10.5" fill="#1f6b60">let x: protected T  ·  redacted T</text>
<text x="679" y="144" text-anchor="middle" font-size="9.5" fill="#1f6b60">may reach a governed sink</text>

<!-- SINK -->
<path d="M679 158 L679 214" fill="none" stroke="#2b8a7e" stroke-width="2" marker-end="url(#arr)"/>
<rect x="470" y="214" width="316" height="60" rx="9" fill="#eef7f5" stroke="#2b8a7e" stroke-width="1.6"/>
<text x="628" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#14534b">GOVERNED SINK</text>
<text x="628" y="257" text-anchor="middle" font-size="9.8" fill="#1f6b60">database.write · audit.write · network egress (redacted) · response.body</text>

<!-- ILLEGAL SHORTCUTS (the checker's job) -->
<text x="34" y="196" font-size="11.5" font-weight="700" fill="#8f2519">Illegal shortcuts the checker refuses ↓</text>

<!-- 003: raw -> sink -->
<path d="M120 158 C 120 300, 300 300, 470 258" fill="none" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arr)"/>
<rect x="34" y="300" width="238" height="52" rx="7" fill="#fbe6e2" stroke="#c0392b" stroke-width="1.5"/>
<text x="153" y="320" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8f2519">FUNGI-VALUESTATE-003 — REJECT</text>
<text x="153" y="337" text-anchor="middle" font-size="9" fill="#a5382b">a raw (unproven) value reaching a sink</text>
<text x="153" y="348" text-anchor="middle" font-size="9" fill="#a5382b">validate it first</text>

<!-- 006: protected -> egress un-redacted -->
<rect x="291" y="300" width="238" height="52" rx="7" fill="#fbe6e2" stroke="#c0392b" stroke-width="1.5"/>
<text x="410" y="320" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8f2519">FUNGI-VALUESTATE-006 — ERROR</text>
<text x="410" y="337" text-anchor="middle" font-size="9" fill="#a5382b">a protected value egressing un-redacted</text>
<text x="410" y="348" text-anchor="middle" font-size="9" fill="#a5382b">redact(x) → let, then send</text>

<!-- 008: boundary -> governed sink un-gated -->
<rect x="548" y="300" width="238" height="52" rx="7" fill="#fcf0d9" stroke="#c08a2e" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="667" y="320" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6b4e15">FUNGI-VALUESTATE-008 — WARN</text>
<text x="667" y="337" text-anchor="middle" font-size="9" fill="#7d5e1d">untrusted boundary → governed sink, un-gated</text>
<text x="667" y="348" text-anchor="middle" font-size="9" fill="#7d5e1d">migration warning · ERRORS in a production build</text>

<!-- value-state labels -->
<rect x="34" y="380" width="752" height="66" rx="9" fill="#f7f4fb" stroke="#7a5bb0" stroke-width="1.2"/>
<text x="410" y="401" text-anchor="middle" font-size="11" font-weight="700" fill="#43306b">The two value-state labels the checker propagates</text>
<text x="230" y="422" text-anchor="middle" font-size="10.5" fill="#6b4e15">protected T — sensitive; denied to egress until redacted</text>
<text x="590" y="422" text-anchor="middle" font-size="10.5" fill="#14534b">redacted T — masked; safe for a sink</text>
<text x="410" y="438" text-anchor="middle" font-size="9.5" fill="#5a4584">a label is contagious across assignment · it can only be lowered by validate.*(...)? (untaint) or redact(x) bound to a let</text>

<!-- invariant -->
<rect x="34" y="466" width="752" height="70" rx="9" fill="#f3eefa" stroke="#7a5bb0" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="410" y="489" text-anchor="middle" font-size="12" font-weight="700" fill="#43306b">The lifecycle's one invariant — prove or redact before use</text>
<text x="410" y="509" text-anchor="middle" font-size="10" fill="#5a4584">no value crosses into a sink still tainted or still protected · the untaint gate is the ONLY lift path · REJECT is fail-closed</text>
<text x="410" y="526" text-anchor="middle" font-size="9.5" fill="#5a4584">examples: 154 validate-email · 161 safe-audit-log · 168 redacted-network-send · 178 governed-data-query — all galerina check clean</text>
</svg>
