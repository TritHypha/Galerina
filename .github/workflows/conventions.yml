# Convention / quality gate (#6 â€” flip the enforcers toward CI-enforcing). Runs the build-free
# `lint-conventions` umbrella (diagnostic-codes Â· doc-drift Â· provenance Â· lint-lln) on every push + PR.
#
# STAGE 1 (now): `--soft` = REPORT-ONLY. It prints the full violation report into the Actions log + the
# step summary but does NOT fail the build, because the baseline is still > 0 (the documented plan:
# drive the scanner baseline â†’ 0, then drop `--soft` to make it enforcing). The pure-node enforcers need
# no build and no `npm install` (they read git-tracked source/docs/artifacts), so this is CI-clean.
# (Full test-suite CI is a separate task â€” the non-workspace monorepo needs per-package installs.)
name: conventions

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Convention gate (report-only â€” STAGE 1 of #6)
        run: |
          echo '## Convention / quality gate (lint-conventions --soft)' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/lint-conventions.mjs --soft | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        # --soft always exits 0: report-only until the baseline reaches 0, then this `--soft` is dropped.

  # A green, build-free, zero-baseline SECURITY invariant â€” run ENFORCING (no --soft): a literal NUL byte in
  # a source file makes it binary-flagged + invisible to grep/git review (an audit-evasion class). This job
  # FAILS a PR that introduces one. It needs no build/install â€” the test reads source files directly.
  hygiene-no-nul:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: No NUL bytes in source (enforcing)
        run: node --test packages-logicn/logicn-core-compiler/tests/source-hygiene-no-nul.test.mjs

  # A green, build-free, zero-baseline OPEN-CORE invariant (0056-ci-lint): no NON-Apache license
  # declaration may contaminate the Apache-2.0 package tree (PD-specâ†›Apache), and no core package may
  # import an enterprise-tier package (coreâ†›enterprise, via governance/tier-manifest.json). The lint's
  # --self-test proves both detectors still fire (a neutered lint is itself a fail-open), then the lint
  # runs ENFORCING. FAILS a PR that introduces cross-tier contamination.
  tier-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Tier-boundary contamination guard (self-test, then enforcing)
        run: |
          node scripts/audit-tier-boundary.mjs --self-test
          node scripts/audit-tier-boundary.mjs

  # A green, build-free, zero-baseline GRAPH-INTEGRITY invariant (RD-0121): the committed project graph
  # must be structurally valid â€” no dangling edge (every from/to references a real node), no duplicate
  # node id, and the depends_on subgraph must be a DAG (no circular package dependency). The `logicn graph`
  # command itself runs no validation; this is the missing check. --self-test proves the detectors fire,
  # then the audit runs ENFORCING. FAILS a PR that commits a corrupt or cyclic graph.
  graph-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Graph integrity (self-test, then enforcing)
        run: |
          node scripts/audit-graph-integrity.mjs --self-test
          node scripts/audit-graph-integrity.mjs
