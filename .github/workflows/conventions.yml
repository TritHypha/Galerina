# Convention / quality gate (#6 — flip the enforcers toward CI-enforcing). Runs the build-free
# `lint-conventions` umbrella (diagnostic-codes · doc-drift · provenance · lint-fungi) on every push + PR.
#
# STAGE 1 (now): `--soft` = REPORT-ONLY. It prints the full violation report into the Actions log + the
# step summary but does NOT fail the build, because the baseline is still > 0 (the documented plan:
# drive the scanner baseline → 0, then drop `--soft` to make it enforcing). The pure-node enforcers need
# no build and no `npm install` (they read git-tracked source/docs/artifacts), so this is CI-clean.
# (Full test-suite CI is a separate task — the non-workspace monorepo needs per-package installs.)
name: conventions

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-conventions:
    needs: kb-preflight
    if: needs.kb-preflight.outputs.has_kb_token == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The KB corpus (docs incl. compiler-diagnostics.md + the count-authority docs the doc-drift
      # enforcers read) migrated to the sibling ZTF-Knowledge-Bases repo. Check it out so the umbrella's
      # doc-drift / diagnostic-doc-drift members see it. If ZTF-KB is private, set a read-only
      # ZTF_KB_READ_TOKEN secret; if public, github.token suffices. A failed checkout fails the job
      # (fail-closed) rather than silently scanning an empty corpus.
      - name: Check out the KB corpus (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: TritHypha/ZTF-Knowledge-Bases
          path: ZTF-Knowledge-Bases
          token: ${{ secrets.ZTF_KB_READ_TOKEN }}

      - name: Convention gate (report-only — STAGE 1 of #6)
        env:
          GALERINA_KB_DIR: ${{ github.workspace }}/ZTF-Knowledge-Bases
        run: |
          echo '## Convention / quality gate (lint-conventions --soft)' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/lint-conventions.mjs --soft | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        # --soft always exits 0: report-only until the baseline reaches 0, then this `--soft` is dropped.

  # A green, build-free, zero-baseline SECURITY invariant — run ENFORCING (no --soft): a literal NUL byte in
  # a source file makes it binary-flagged + invisible to grep/git review (an audit-evasion class). This job
  # FAILS a PR that introduces one. It needs no build/install — the test reads source files directly.
  hygiene-no-nul:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: No NUL bytes in source (enforcing)
        run: node --test packages-galerina/galerina-core-compiler/tests/source-hygiene-no-nul.test.mjs

  # path-leak (build-free, zero-baseline, ENFORCING): no committed file may contain an ABSOLUTE LOCAL path
  # that leaks the developer's machine (a `C:\Users\<name>` home or a legacy wwwprojects root). Galerina is PUBLIC — such
  # a path discloses the OS username + on-disk layout to the world AND breaks on every other checkout. The
  # --self-test proves the detectors fire on a leak and stay silent on a <placeholder> (a neutered guard is a
  # fail-open); then the scan runs ENFORCING against every git-tracked file. Baseline is 0.
  path-leak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Absolute-local-path leak guard (self-test, then enforcing)
        run: |
          node scripts/audit-path-leak.mjs --self-test
          node scripts/audit-path-leak.mjs

  # papers-index (build-free, zero-baseline, ENFORCING): the papers corpus index (docs/paper/README.md)
  # must link EVERY tracked paper under docs/paper/{defensive,scientific}-papers/, every index link must
  # resolve, and the intro corpus counts must match reality. A silently-unindexed defensive-publication is
  # a governance gap (a timestamped prior-art record the corpus index omits); a dangling link is a broken
  # published record. The --self-test proves the gap detectors fire before the enforcing scan. Baseline is 0.
  papers-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Papers-index coverage guard (self-test, then enforcing)
        run: |
          node scripts/audit-papers-index.mjs --self-test
          node scripts/audit-papers-index.mjs

  # route-overlap (build-free, ENFORCING, DP-RD-0285): no two same-method routes in ONE .fungi file may have
  # overlapping match sets. Galerina refuses ambiguous HTTP dispatch as a governed HOLD instead of the
  # first-match-wins / precedence rules mainstream routers ship (route-confusion: path-normalisation
  # shadowing, method-override bypass). Static overlap analysis over the closed {param}=([^/]+) pattern
  # language of route-registry.ts, scoped per-file (one parsed program = one registry) so it stays SOUND.
  # The --self-test proves the overlap detector fires before the enforcing scan.
  route-overlap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Route-overlap ambiguity guard (self-test, then enforcing)
        run: |
          node scripts/audit-route-overlap.mjs --self-test
          node scripts/audit-route-overlap.mjs

  # A green, build-free, zero-baseline OPEN-CORE invariant (0056-ci-lint): no NON-Apache license
  # declaration may contaminate the Apache-2.0 package tree (PD-spec↛Apache), and no core package may
  # import an enterprise-tier package (core↛enterprise, via governance/tier-manifest.json). The lint's
  # --self-test proves both detectors still fire (a neutered lint is itself a fail-open), then the lint
  # runs ENFORCING. FAILS a PR that introduces cross-tier contamination.
  tier-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Tier-boundary contamination guard (self-test, then enforcing)
        run: |
          node scripts/audit-tier-boundary.mjs --self-test
          node scripts/audit-tier-boundary.mjs

  # gate-injection (build-free, zero-baseline, ENFORCING): every non-test caller of the admission border
  # (fusePackage / fusePackages / buildImportClosure) must inject the revocation gate (revocationCheck) —
  # a host that fuses without it silently admits a REVOKED signing key (a fail-open no happy-path test
  # catches). version.json mandates this gate "fails CI"; this job makes that true. --self-test proves the
  # detector fires; then the scan runs ENFORCING.
  gate-injection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Admission-border revocation-gate injection guard (self-test, then enforcing)
        run: |
          node scripts/check-gate-injection.mjs --self-test
          node scripts/check-gate-injection.mjs

  # production-blockers (build-free, zero-baseline, ENFORCING): every code in production-check.ts
  # PRODUCTION_BLOCKERS must have a real emitter. A blocker no compiler pass can produce advertises a
  # deployment block it cannot enforce (the false memory-gate: FUNGI-MEMORY-001/002/003/007 were blockers
  # with no emitter). The --self-test proves the detector fires; then the scan runs ENFORCING.
  production-blockers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Production-blocker emitter guard (self-test, then enforcing)
        run: |
          node scripts/audit-production-blockers.mjs --self-test
          node scripts/audit-production-blockers.mjs

  # name-collisions (build-free, zero-baseline, ENFORCING): no two package names may be reordered-token
  # near-anagrams (the graph-project / project-graph tangle) or typo-twins. The --self-test proves the
  # detectors fire; then the scan runs ENFORCING against live package.json names + governance/name-registry.json
  # (known collisions allowlisted with a decided resolution). FAILS a PR that introduces a confusing new name.
  name-collisions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Name-collision guard (self-test, then enforcing)
        run: |
          node scripts/audit-name-collisions.mjs --self-test
          node scripts/audit-name-collisions.mjs

  # diagnostic-doc-drift (build-free, zero-baseline, ENFORCING): the canonical diagnostic reference
  # (compiler-diagnostics.md) must not misdescribe a WIRED code. For any FUNGI-* code that carries a
  # structured name/message in source AND a description in the doc, the two must share at least one
  # meaningful word — zero overlap means the doc is describing a different fault (the FUNGI-RUNTIME-006
  # "Audit event stream write failed" / really RateLimitExceeded class). The --self-test proves the
  # detector fires; then the scan runs ENFORCING (reads .ts source + the .md doc directly — no build).
  diagnostic-doc-drift:
    needs: kb-preflight
    if: needs.kb-preflight.outputs.has_kb_token == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # The canonical diagnostic reference (compiler-diagnostics.md) migrated to the sibling
      # ZTF-Knowledge-Bases repo, so this cross-repo gate needs it checked out. Without it the enforcing
      # scan fail-closes (exit 1) — which is why this job went RED after the migration. If ZTF-KB is
      # private, set a read-only ZTF_KB_READ_TOKEN secret; if public, github.token suffices.
      - name: Check out the KB corpus (sibling repo — holds compiler-diagnostics.md)
        uses: actions/checkout@v4
        with:
          repository: TritHypha/ZTF-Knowledge-Bases
          path: ZTF-Knowledge-Bases
          token: ${{ secrets.ZTF_KB_READ_TOKEN }}
      - name: Diagnostic doc↔source drift (self-test, then enforcing)
        env:
          GALERINA_KB_DIR: ${{ github.workspace }}/ZTF-Knowledge-Bases
        run: |
          node scripts/audit-diagnostic-doc-drift.mjs --self-test
          node scripts/audit-diagnostic-doc-drift.mjs

  # overclaim-phrases (build-free, zero-baseline, ENFORCING): no doc/.fungi/code-comment may pair a
  # complexity-boost claim (O(1) / single-clock / constant-time) with a zeroing token (fill / wipe /
  # memory.fill) within ~8 words. memory.fill is ONE WASM opcode (0xFC 0x0B) that does Θ(arena-size) work
  # — the "O(1) zero-wipe / single-clock-cycle wipe" framing is settled-false (RD-0126 overclaim-E,
  # RD-0114-G2) and the shipped wat-emitter already phrases it right ("ONE atomic instruction" over
  # [base, heap)). Lines that CORRECT/refute the claim are exempt. The --self-test proves the detector
  # fires AND its exemption stays targeted; then the scan runs ENFORCING (reads docs/source directly — no build).
  overclaim-phrases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Overclaim phrase-blocklist (self-test, then enforcing)
        run: |
          node scripts/audit-overclaim-phrases.mjs --self-test
          node scripts/audit-overclaim-phrases.mjs

  # graph-integrity self-test (build-free): the structural-graph detectors (dangling edge / dup id /
  # dependency cycle / stale sourcePath) must keep firing. The FULL audit validates a GENERATED graph
  # (build/graph/*.json is a ~3MB gitignored artifact + the CLI dist is not committed), so it cannot run
  # against a committed graph build-free — it runs locally / pre-commit / in a build-full job. Here we
  # only enforce that the audit's detectors are not silently neutered (a neutered audit is a fail-open).
  graph-integrity-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Graph-integrity detectors self-test (build-free)
        run: node scripts/audit-graph-integrity.mjs --self-test

  # web-stub-guard (build-free, zero-baseline, ENFORCING): the deny-by-default galerina-web-* contracts
  # must be born fail-closed. Each README states "RawHtml deny / untrusted-until-typed / gesture-required /
  # redirect-deny" in PROSE only — it fails OPEN the moment impl lands (CWE-79 XSS, CWE-601 open-redirect,
  # CWE-501 trust-boundary, CWE-862 missing-authz). A STUB (no src/dist) is inert and passes; an
  # IMPLEMENTED web-* package MUST also ship a *.failclosed/acceptance.test exercising its FUNGI-WEB-*
  # invariants (governance/web-failclosed-contract.json). The --self-test proves the detectors fire; then
  # the scan runs ENFORCING — the first PR that implements a web-* package is forced to add its tests.
  web-stub-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Web fail-closed contract guard (self-test, then enforcing)
        run: |
          node scripts/audit-web-stub-guard.mjs --self-test
          node scripts/audit-web-stub-guard.mjs

  # hardened-border (#149, ENFORCING): re-scan EVERY package FROM SOURCE and enforce its committed
  # .graph/boundary-policy.json allowlist (the Hardened Border). Unlike the build-free gates above, this
  # one BUILDS the package-graph scanner first — it is pure TypeScript with ZERO runtime deps, so the
  # build is a scoped `npm install` of just typescript + @types/node (no package-tree install) then tsc.
  # That lets the gate RE-DERIVE each package's external import surface from source rather than trust the
  # committed .graph/package-graph.json (the very artifact a drift-introducer controls) — zero-trust. It
  # FAILS a PR that: imports an external past the border, deletes a boundary-policy.json (delete-to-launder),
  # or ships a malformed allowlist (unknown → deny). The gate's own --self-test proves it still FIRES (on an
  # unlisted external AND a missing policy) before the enforcing sweep — a defanged border gate is a fail-open.
  hardened-border:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build the package-graph scanner (pure TS, no runtime deps)
        working-directory: packages-galerina/galerina-devtools-package-graph
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: Hardened Border — re-scan from source, enforce every package's policy (self-test, then enforcing)
        run: node scripts/audit-package-border.mjs

  # runtime-coverage (#54, build-free, ENFORCING): the type-checker green-lights numeric `a op b` broadly, but
  # the tree-walker only services a (tag, op) pair that is in BINARY_DISPATCH (or the int/float fallback). A
  # numeric value-tag that supports SOME operators but is MISSING others traps at runtime ("not supported") —
  # or, pre-fix, computed a silent wrong value (the Decimal-in-WASM money bug). This lint DERIVES coverage from
  # interpreter.ts BINARY_DISPATCH (single source of truth) and FAILS if any numeric tag lacks the full operator
  # set unless the missing pair is an INTENTIONAL partial on the allowlist (with its redirect-to-method form
  # recorded — e.g. Decimal '/' → a.divide(b, rounding, scale)). Catches partial-op drift + a dropped dispatch
  # key. --self-test proves the gap detector fires on a planted hole before the enforcing scan. Baseline is 0.
  runtime-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Runtime operator-coverage gate (self-test, then enforcing)
        run: node scripts/audit-runtime-coverage.mjs

  # phase-close gates (build-free, ENFORCING) — mirror the BLOCKING gates in scripts/run-phase-close.mjs
  # that previously ran ONLY on a developer's machine ("NO CI exists — every gate is manually enforced"
  # was version.json's #1 ops risk; this closes most of it). Each reads git-tracked SOURCE directly (no
  # build, no package-tree install) and is zero-baseline green today; a --self-test runs first where the
  # tool ships one (a neutered audit is itself a fail-open). Grouped in ONE job so a single checkout+setup
  # covers all; each step fails the job independently so the Actions UI shows which invariant broke.
  phase-close-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # checker:wiring — every EXPORTED checker has a real pipeline call-site (the dead-gate class:
      # checkTaint / checkMonkeyPatching / checkAttributeDirectives each had ZERO call-sites before the fix).
      - name: Dead-gate / checker-wiring guard (self-test, then enforcing)
        run: |
          node scripts/audit-checker-wiring.mjs --self-test
          node scripts/audit-checker-wiring.mjs
      # sink:canonicality — no stdlib egress/exec/write sink silently escapes the taint / value-state sink
      # hand-lists (the sink-drift class). Ships a --self-test + a reasoned allowlist.
      - name: Sink/source canonicality guard (self-test, then enforcing)
        run: |
          node scripts/audit-sink-canonicality.mjs --self-test
          node scripts/audit-sink-canonicality.mjs
      # effect:canonicality — the compiler's effect tables (CANONICAL_EFFECTS · EFFECT_NAME_TO_FLAG ·
      # EFFECT_REGISTRY · SECURE_REQUIRED/PURE_FORBIDDEN) must agree; a name accepted by one table but
      # rejected by another let an AI author non-compiling governed code. Blocks on INTERNAL drift.
      - name: Effect-vocabulary single-source-of-truth (enforcing)
        run: node scripts/audit-effect-canonicality.mjs
      # effects:corpus — the teaching corpus (examples/, docs/, package src) may declare only effect names
      # a PRODUCTION compile accepts (nothing else production-compiles the examples, so a bad name teaches
      # silently).
      - name: Corpus effect-name conformance (enforcing)
        run: node scripts/audit-corpus-effect-names.mjs
      # muted:diagnostics — a silenced security/governance diagnostic is a fail-open. FAILS if such a code
      # is muted WITHOUT being on the reviewed allowlist, so muting can never happen silently again.
      - name: Muted security/governance diagnostics guard (enforcing)
        run: node scripts/audit-muted-diagnostics.mjs
      # scratch-dir:hygiene — no test creates build/<prefix>-${process.pid} scratch dirs without rmSync
      # cleanup (the flaky-gate + unbounded-disk-leak class). Own-pid sweep is parallel-safe.
      - name: Test scratch-dir hygiene (enforcing)
        run: node scripts/audit-scratchdir-hygiene.mjs
      # signed:fixtures — a SIGNED fusable package must be git-clean (the annotation→re-fuse→unsigned
      # cascade class). On a clean CI checkout this proves no signed artifact was committed dirty.
      - name: Signed-fixture drift guard (enforcing)
        run: node scripts/audit-signed-fixture-drift.mjs
      # dev-tool script tests — the audit/index/registry tooling itself (scripts/tests/) lives OUTSIDE
      # packages-galerina, so the package runner never sees it. Run here so the gates that guard the repo
      # are themselves regression-gated (incl. the doc-drift KB-resolution + fail-closed benches).
      # The two BUILD-dependent script tests (cg4-signing-boundary + signed-fixture-guard — they drive
      # `galerina.mjs build`, which imports galerina-core-compiler/dist) run in the separate build-cli-gates
      # job below; exclude them here so THIS job stays build-free. A new build-free test is auto-included
      # (the glob minus the two known build-dependent files) — no silent under-coverage.
      - name: Dev-tool script tests (build-free)
        run: |
          files=$(ls scripts/tests/*.test.mjs | grep -vE '/(cg4-signing-boundary|signed-fixture-guard)\.test\.mjs$')
          echo "build-free script tests:"; echo "$files"
          node --test $files

  # build-cli gates (BUILD-FULL, ENFORCING) — the two script tests that drive `galerina.mjs build`
  # (CG-4 signing-boundary + the CG-7 signed-fixture guard) need galerina-core-compiler/dist, which is
  # gitignored. They passed only on a dev box (dist present) and errored "Cannot find module .../dist" in
  # CI — the "green locally, red in CI" class these gates exist to prevent. Build the compiler's file: dep
  # closure first (scripts/build-core-chain.mjs — topological, fail-closed) so the gates ACTUALLY enforce
  # in CI instead of being silently skipped. Isolated in its own job so the fast build-free gates stay fast.
  build-cli-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build galerina-core-compiler + its file-dep closure (topological)
        run: node scripts/build-core-chain.mjs
      - name: CG-4 signing-boundary + CG-7 signed-fixture guard (build-dependent, enforcing)
        run: node --test scripts/tests/cg4-signing-boundary.test.mjs scripts/tests/signed-fixture-guard.test.mjs

  # KB-availability preflight — the two doc-drift gates (lint-conventions, diagnostic-doc-drift) read the
  # canonical diagnostics / count-authority docs from the PRIVATE sibling repo ZTF-Knowledge-Bases. The
  # default github.token cannot read a *separate* private repo, so they need a read-only ZTF_KB_READ_TOKEN
  # secret (a fine-grained PAT or deploy key, read-only, scoped to TritHypha/ZTF-Knowledge-Bases). Until that
  # secret exists they are SKIPPED (visibly grey, not red) rather than failing every push at the checkout
  # step — a failed checkout enforces nothing AND emails a failure on every push. They still run ENFORCING
  # locally / pre-commit (run-phase-close, where the KB is present), and auto-enable the moment the token is
  # added:  gh secret set ZTF_KB_READ_TOKEN --repo TritHypha/Galerina  (paste a read-only KB-scoped PAT).
  kb-preflight:
    runs-on: ubuntu-latest
    outputs:
      has_kb_token: ${{ steps.probe.outputs.has }}
    steps:
      - id: probe
        run: echo "has=${{ secrets.ZTF_KB_READ_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
