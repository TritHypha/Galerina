# Secret-scan (#149) — gitleaks over the public repo. Guards against a real credential being committed
# (the original P0 was the rotated-but-leaked signing key `8eecf4…`). Fail-closed: a finding fails the job.
name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly full-history sweep (Mondays 06:00 UTC) — catches anything pushed off-PR
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan the ENTIRE history, not just the tip — a leaked secret lives in old commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action is free for PUBLIC repos; no license key needed.
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITHUB_TOKEN is REQUIRED for pull_request scans (the action fetches the PR commits via the API);
          # push/schedule work without it. Without this the action hard-fails EVERY PR with "GITHUB_TOKEN is
          # now required to scan pull requests" on an otherwise clean diff (surfaced by the repo's first PR).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On push/schedule scan all history; on PR scan the PR diff (the action selects this automatically).
