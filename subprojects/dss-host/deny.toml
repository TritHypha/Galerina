# cargo-deny config for dss-host — the DSS.wasm sidecar TCB.
# Supply-chain zero-trust from day one (RT-28 "embedder-dependency vetting"; owner charter 2026-07-22).
# Run:  cargo deny check      (install: cargo install --locked cargo-deny)
# This is the fail-closed gate on what may enter the production trust base.

[advisories]
version = 2
# Any known security advisory or yanked crate is a RED gate — the TCB does not ship on a known hole.
yanked = "deny"

[licenses]
version = 2
# Permissive-only allow-list. The trust base must never pull copyleft-viral or unknown-terms code.
# Add a license here ONLY after reading it — never widen this to clear a build.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
# No silent multiple-version sprawl in the trust base; no wildcard version requirements.
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Only crates.io; no unknown registries, no arbitrary git dependencies in the TCB.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
